trigger:
  branches:
    include:
    - '*' 

jobs:
- job: enableSSH
  displayName: 'enableSSH'
  pool:
    name: mimeo-win2022-vmss

  steps:

  - task: PowerShell@2
    inputs:
      targetType: 'inline'
      script: |
        Get-WindowsCapability -Online | Where-Object Name -like 'OpenSSH*'
            
            # Install the OpenSSH Client
            Add-WindowsCapability -Online -Name OpenSSH.Client~~~~0.0.1.0
            
            # Install the OpenSSH Server
            Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
            
            # Start the sshd service
            Start-Service sshd
            
            # OPTIONAL but recommended:
            Set-Service -Name sshd -StartupType 'Automatic'
            
            # Confirm the Firewall rule is configured. It should be created automatically by setup. Run the following to verify
            if (!(Get-NetFirewallRule -Name "OpenSSH-Server-In-TCP" -ErrorAction SilentlyContinue | Select-Object Name, Enabled)) {
                Write-Output "Firewall Rule 'OpenSSH-Server-In-TCP' does not exist, creating it..."
                New-NetFirewallRule -Name 'OpenSSH-Server-In-TCP' -DisplayName 'OpenSSH Server (sshd)' -Enabled True -Direction Inbound -Protocol TCP -Action Allow -LocalPort 22
            } else {
                Write-Output "Firewall rule 'OpenSSH-Server-In-TCP' has been created and exists."
            }
     
- job: createImage
  displayName: 'createImage'
  dependsOn: enableSSH
  pool:
    name: mimeo-win2022-vmss
- template: linux-image-generation-mimeo.yml
  parameters:
    image_type: ubuntu2404
    image_readme_name: Ubuntu2404-Readme.md
    image_template_name: ubuntu-24.04-mimeo.pkr.hcl
